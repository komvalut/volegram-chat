<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="VBC — Bitcoin Lightning P2P Chat. Zero KYC. Instant sats. Own your money." />

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⚡%3C/text%3E%3C/svg%3E" type="image/svg+xml" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

    <title>VBC ⚡ — Volegram Bitcoin Chat</title>

    <style>
      html, body { background: #ffffff; margin: 0; padding: 0; }
      #vbc-splash {
        position: fixed; inset: 0; background: #ffffff;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; font-family: 'Space Mono', monospace;
        transition: opacity 0.4s ease;
      }
      #vbc-splash.hidden { opacity: 0; pointer-events: none; }
      #vbc-splash .bolt {
        font-size: 4rem; color: #000;
        animation: btc-pulse 1.2s ease-in-out infinite;
      }
      #vbc-splash p {
        color: #000; font-size: 14px; letter-spacing: 0.3em;
        text-transform: uppercase; margin-top: 16px; font-weight: 700;
        animation: btc-pulse 1.2s ease-in-out infinite;
      }
      @keyframes btc-pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.35; }
      }
    </style>
  </head>
  <body>
    <div id="vbc-splash">
      <div class="bolt">⚡</div>
      <p>Volegram Bitcoin Chat</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      function removeSplash() {
        var splash = document.getElementById("vbc-splash");
        if (splash) { splash.style.opacity = "0"; setTimeout(function(){ if(splash.parentNode) splash.parentNode.removeChild(splash); }, 400); }
      }
      var splashTimeout = setTimeout(removeSplash, 4000);
      document.addEventListener("DOMContentLoaded", function() {
        var observer = new MutationObserver(function() {
          var root = document.getElementById("root");
          if (root && root.children.length > 0) {
            clearTimeout(splashTimeout);
            removeSplash();
            observer.disconnect();
          }
        });
        var root = document.getElementById("root");
        if (root) observer.observe(root, { childList: true });
      });

      if (window.navigator.standalone) {
        document.documentElement.classList.add("ios-pwa");
      }
    </script>
  </body>
</html>
