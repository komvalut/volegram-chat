services:
  - type: web
    name: volegram-chat
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install &&
      pnpm --filter @workspace/volegram run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SBP_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
