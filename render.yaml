services:
  - type: web
    name: volegram-chat
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/volegram run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: volegram-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SBP_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false

databases:
  - name: volegram-db
    databaseName: volegram
    plan: free
    region: frankfurt
